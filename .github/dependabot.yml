version: 2
updates:
  # .NET / NuGet dependencies (Central Package Management)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      test:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
