name: Packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Package version (without leading v)
        required: false
        default: "0.0.0"

permissions:
  contents: write

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish self-contained binary
        run: >-
          dotnet publish src/Netdocs.Cli -c Release -r linux-x64 --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o dist

      - name: Install nfpm
        run: |
          curl -sSfL "https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_$(uname -m)_Linux.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm || {
              go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
              echo "$HOME/go/bin" >> "$GITHUB_PATH"
            }

      - name: Build .deb and .rpm
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          mkdir -p out
          nfpm package -f packaging/nfpm.yaml -p deb -t out/
          nfpm package -f packaging/nfpm.yaml -p rpm -t out/
          ls -l out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netdocs-packages
          path: out/*

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
