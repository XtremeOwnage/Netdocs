<footer class="md-footer">
  <div class="md-footer-meta md-typeset">
    <div class="md-footer-meta__inner md-grid">
      <div class="md-copyright">
        {{~ if config.copyright ~}}<div class="md-copyright__highlight">{{ config.copyright }}</div>{{~ end ~}}
        Built with <a href="https://github.com/squidfunk/mkdocs-material" target="_blank" rel="noopener">Material for MkDocs</a> styling via Netdocs
      </div>
      {{~ if extra.social ~}}
      <div class="md-social">
        {{~ for link in extra.social ~}}
        <a href="{{ link.link }}" target="_blank" rel="noopener" title="{{ link.icon }}" class="md-social__link">{{ link.icon }}</a>
        {{~ end ~}}
      </div>
      {{~ end ~}}
    </div>
  </div>
</footer>
