<footer class="md-footer">
  <div class="md-footer-meta md-typeset">
    <div class="md-footer-meta__inner md-grid">
      <div class="md-copyright">
        {{ if config.copyright }}{{ config.copyright }}{{ end }}
        <div class="md-copyright__highlight">Built with Netdocs</div>
      </div>
      {{ if extra.social }}
      <div class="md-social">
        {{ for link in extra.social }}
        <a href="{{ link.link }}" class="md-social__link" title="{{ link.icon }}">{{ link.icon }}</a>
        {{ end }}
      </div>
      {{ end }}
    </div>
  </div>
</footer>
