<style>
  /* Let highlight.js color tokens, but keep Material's code container styling. */
  .md-typeset .highlight code.hljs { background: transparent; padding: 0; }
  /* Line numbers (highlightjs-line-numbers.js) styled to match Material. */
  .md-typeset .hljs-ln { border-collapse: collapse; }
  .md-typeset .hljs-ln td { padding: 0; border: 0; vertical-align: top; }
  .md-typeset .hljs-ln-numbers {
    user-select: none; text-align: right; color: var(--md-default-fg-color--lighter);
    border-right: .05rem solid var(--md-default-fg-color--lightest);
    padding-right: .8rem !important; padding-left: .2rem !important; white-space: nowrap;
  }
  .md-typeset .hljs-ln-numbers a { color: inherit; text-decoration: none; }
  .md-typeset .hljs-ln-code { padding-left: .8rem !important; }
  /* When only hl_lines is used (no linenums) the numbers table still exists to
     anchor row highlighting, but the gutter itself must stay hidden. */
  .md-typeset code.nd-hide-linenums .hljs-ln-numbers { display: none; }
  .md-typeset code.nd-hide-linenums .hljs-ln-code { padding-left: 0 !important; }
  /* hl_lines highlight — a faint tinted background plus a solid left accent bar,
     matching Material's own `.hll`. Using the SOLID accent as the row background
     washed out the syntax-colored tokens, so use the translucent `--light` tint. */
  .md-typeset .hljs-ln tr.hl-line {
    background: var(--md-code-hl-color--light, rgba(66, 135, 255, .1));
    box-shadow: 2px 0 0 0 var(--md-code-hl-color, #4287ff) inset;
  }
  /* Inline code highlighting is colored by hljs like block code. */
  .md-typeset code.hljs { padding: 0 .2941176471em; }

  /* Map highlight.js token classes onto Material's scheme-aware code colors so
     syntax highlighting stays legible in both light and dark palettes (the
     stock hljs themes are single-scheme and wash out on the opposite one). */
  .md-typeset .hljs { color: var(--md-code-fg-color); }
  .md-typeset .hljs-comment,
  .md-typeset .hljs-quote { color: var(--md-code-hl-comment-color); font-style: italic; }
  .md-typeset .hljs-keyword,
  .md-typeset .hljs-selector-tag,
  .md-typeset .hljs-literal,
  .md-typeset .hljs-section,
  .md-typeset .hljs-doctag { color: var(--md-code-hl-keyword-color); }
  .md-typeset .hljs-string,
  .md-typeset .hljs-regexp,
  .md-typeset .hljs-addition,
  .md-typeset .hljs-meta .hljs-string { color: var(--md-code-hl-string-color); }
  .md-typeset .hljs-number,
  .md-typeset .hljs-symbol,
  .md-typeset .hljs-bullet { color: var(--md-code-hl-number-color); }
  .md-typeset .hljs-title,
  .md-typeset .hljs-title.function_,
  .md-typeset .hljs-function .hljs-title { color: var(--md-code-hl-function-color); }
  .md-typeset .hljs-built_in,
  .md-typeset .hljs-class .hljs-title,
  .md-typeset .hljs-title.class_,
  .md-typeset .hljs-type,
  .md-typeset .hljs-meta { color: var(--md-code-hl-special-color); }
  .md-typeset .hljs-name,
  .md-typeset .hljs-tag,
  .md-typeset .hljs-selector-id,
  .md-typeset .hljs-selector-class { color: var(--md-code-hl-name-color); }
  .md-typeset .hljs-attr,
  .md-typeset .hljs-attribute,
  .md-typeset .hljs-variable,
  .md-typeset .hljs-template-variable,
  .md-typeset .hljs-property { color: var(--md-code-hl-variable-color); }
  .md-typeset .hljs-operator,
  .md-typeset .hljs-punctuation { color: var(--md-code-hl-operator-color); }
  .md-typeset .hljs-deletion { color: var(--md-code-hl-string-color); }
  .md-typeset .hljs-emphasis { font-style: italic; }
  .md-typeset .hljs-strong { font-weight: 700; }
</style>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
<!-- highlight.min.js only bundles the "common" language set. Register the extra
     major languages a homelab/infra docs site relies on so nothing renders as
     plain text (PowerShell, Dockerfile, nginx, HTTP, YAML frontmatter, etc.). -->
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/powershell.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/dockerfile.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/nginx.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/apache.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/http.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/dns.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/properties.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/dart.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/scala.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/x86asm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlightjs-line-numbers.js@2.9.1/dist/highlightjs-line-numbers.min.js"></script>
<script>
  (function () {
    function parseRanges(spec) {
      var set = {};
      (spec || "").split(/[\s,]+/).forEach(function (part) {
        if (!part) return;
        var m = part.split("-");
        var lo = parseInt(m[0], 10);
        var hi = m.length > 1 ? parseInt(m[1], 10) : lo;
        for (var i = lo; i <= hi; i++) set[i] = true;
      });
      return set;
    }

    function decorate(el) {
      var hasLineNums = el.hasAttribute("data-linenums-start");
      var hl = el.getAttribute("data-hl-lines");
      // The row-based table produced by the line-numbers library is what both
      // the number gutter and hl_lines highlighting hang off of. Build it when
      // either feature is requested; hide the gutter when only hl_lines is set.
      if ((hasLineNums || hl) && hljs.lineNumbersBlock) {
        var start = parseInt(el.getAttribute("data-linenums-start"), 10);
        hljs.lineNumbersBlock(el, { singleLine: true, startFrom: isNaN(start) ? 1 : start });
        if (!hasLineNums) el.classList.add("nd-hide-linenums");
      }
      if (!hl) return;
      var block = el;
      // highlightjs-line-numbers replaces content asynchronously; run after a tick.
      setTimeout(function () {
        var rows = block.querySelectorAll("tr");
        var ranges = parseRanges(hl);
        rows.forEach(function (row, idx) {
          if (ranges[idx + 1]) row.classList.add("hl-line");
        });
      }, 0);
    }

    // Highlight every not-yet-processed block. Idempotent, so it is safe to call
    // on each page load (including Material's instant navigation swaps).
    function highlightAll() {
      if (!window.hljs) return;
      document.querySelectorAll("pre code:not(.hljs)").forEach(function (el) {
        try {
          hljs.highlightElement(el);
          decorate(el);
        } catch (e) { /* unknown language */ }
      });
      // Inline highlighted code (pymdownx.inlinehilite): #!lang shebang.
      document.querySelectorAll("code.language-\\*, :not(pre) > code[class^='language-']:not(.hljs)").forEach(function (el) {
        try { hljs.highlightElement(el); } catch (e) { /* ignore */ }
      });
    }

    // Material exposes the `document$` observable which emits on first load and on
    // every instant-navigation page swap. Subscribing keeps code blocks highlighted
    // without a hard refresh. Fall back to DOMContentLoaded when it is unavailable.
    if (window.__netdocsHljsBound) return;
    window.__netdocsHljsBound = true;
    if (window.document$ && typeof window.document$.subscribe === "function") {
      window.document$.subscribe(highlightAll);
    } else if (document.readyState !== "loading") {
      highlightAll();
    } else {
      document.addEventListener("DOMContentLoaded", highlightAll);
    }
  })();
</script>
